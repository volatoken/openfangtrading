      - id: "pa10_net_delta_by_strike_all_exp"
        title: "Net Delta by Strike (All Exp)"
        inputs:
          - "options_trade_flow"
          - "options_mark_surface"
        metrics:
          - "net_delta_flow_by_strike"
        refresh:
          ui_ms: 1000
          rollup_sec: 60
        storage:
          derived:
            - "derived_strike_metrics_1m"
        chart:
          type: "horizontal_diverging_bar"
          axis_unit: "delta_contract_equiv"

      - id: "pa11_gex_by_strike_all_exp"
