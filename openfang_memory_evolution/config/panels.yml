alert_rules:
  bubble_anomaly:
    source: "option_trade_events"
    formula_ref: "bubble_anomaly_score"
    trigger:
      any:
        - "premium_usdt >= 100000"
        - "bubble_anomaly_score >= 3.0"
    action:
      - "persist signal snapshot"
      - "telegram notify if enabled"

  mp_divergence_reversion_buy:
    formula_ref: "otl_mp_divergence_reversion_buy"
    source:
      - "derived_maxpain_poc_1m"
      - "derived_expiry_metrics_1m"
      - "option_index_snapshots"
    recalc_sec: 5

  mp_divergence_reversion_sell:
    formula_ref: "otl_mp_divergence_reversion_sell"
    source:
      - "derived_maxpain_poc_1m"
      - "derived_expiry_metrics_1m"
      - "option_index_snapshots"
    recalc_sec: 5
